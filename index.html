<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestionale Negozio</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">
                <i data-lucide="chevron-left" size="22"></i>
            </button>
        </div>
        <div class="title" id="page-title">Negozio</div>
        <div class="header-right">
            <button class="btn-search-trigger" onclick="openSearchModal()" id="btn-search-trigger">
                🔍 Cerca
            </button>
        </div>
    </div>

    <div id="app-container"></div>

    <button class="fab" onclick="openProductModal()">+</button>

    <div class="modal-bg" id="modal-product">
        <div class="modal">
            <h2 id="modal-title" style="margin-top:0;">Nuovo Prodotto</h2>
            <input type="hidden" id="edit-id">
            
            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Animale</label>
                    <select id="inp-type"><option value="dog">Cane</option><option value="cat">Gatto</option></select>
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Categoria</label> 
                    <select id="inp-consistency">
                        <option value="Secco">Secco</option>
                        <option value="Umido">Umido</option>
                    </select>
                </div>
            </div>

            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Marca</label>
                    <input type="text" id="inp-brand" class="input" placeholder="Es. Monge">
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Linea</label>
                    <select id="inp-line">
                        <option value="">-- Seleziona --</option>
                        <option value="Mantenimento">Mantenimento</option>
                        <option value="Medicati">Medicati</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">Nome Completo</label>
                <input type="text" id="inp-full-name" class="input" placeholder="Es. Renal">
            </div>

            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Peso / Formato</label>
                    <input type="text" id="inp-weight" class="input" placeholder="Es. 1.5kg">
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Quantità</label>
                    <input type="number" id="inp-qty" class="input" placeholder="0" min="0" step="1">
                </div>
            </div>
            
            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Foto</label>
                    <div class="file-input-wrapper" onclick="document.getElementById('file-img').click()" id="wrap-img">
                        <span class="file-label" id="lbl-img">📸 Foto</span>
                    </div>
                    <input type="file" id="file-img" accept="image/*" onchange="updateLabel('img')">
                    <input type="hidden" id="url-img"> 
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Tabella</label>
                    <div class="file-input-wrapper" onclick="document.getElementById('file-ration').click()" id="wrap-ration">
                        <span class="file-label" id="lbl-ration">📊 Tabella</span>
                    </div>
                    <input type="file" id="file-ration" accept="image/*" onchange="updateLabel('ration')">
                    <input type="hidden" id="url-ration">
                </div>
            </div>

            <div class="field">
                <label class="label">Descrizione</label>
                <textarea id="inp-desc" class="input" style="height:80px"></textarea>
            </div>

            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeProductModal()">Annulla</button>
                <button class="btn btn-shop" onclick="saveProduct()">Salva</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="modal-search">
        <div class="modal">
            <h2 style="margin-top:0; margin-bottom:20px;">🔍 Cerca nel Magazzino</h2>
            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Animale</label>
                    <select id="s-type">
                        <option value="all">Tutti</option>
                        <option value="dog">Cane</option>
                        <option value="cat">Gatto</option>
                    </select>
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Categoria</label>
                    <select id="s-consistency">
                        <option value="">Tutti</option>
                        <option value="Secco">Secco</option>
                        <option value="Umido">Umido</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="field" style="flex:1">
                    <label class="label">Marca</label>
                    <input type="text" id="s-brand" class="input" placeholder="Es. Monge">
                </div>
                <div class="field" style="flex:1">
                    <label class="label">Linea</label>
                    <select id="s-line">
                        <option value="">Tutte</option>
                        <option value="Mantenimento">Mantenimento</option>
                        <option value="Medicati">Medicati</option>
                    </select>
                </div>
            </div>
            <div class="field">
                <label class="label">Contiene nel nome</label>
                <input type="text" id="s-text" class="input" placeholder="Es. Renal, Puppy...">
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeSearchModal()">Chiudi</button>
                <button class="btn btn-shop" onclick="applySearch()">Cerca Ora</button>
            </div>
            <button class="btn btn-reset" onclick="resetSearch()">Resetta Filtri</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
